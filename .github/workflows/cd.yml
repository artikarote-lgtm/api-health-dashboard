name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t api-dashboard .

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Tag Image
      run: docker tag api-dashboard ${{ secrets.DOCKER_USERNAME }}/api-dashboard:latest

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/api-dashboard:latest