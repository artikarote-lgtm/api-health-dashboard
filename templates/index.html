<!DOCTYPE html>
<html>

<head>
    <title>API Health Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* Dark Mode Toggle Button */

.toggle {
    position: absolute;
    right: 20px;
    top: 20px;
    cursor: pointer;
    font-size: 20px;
}

/* Dark Mode Styles */

.dark {
    background: #1e1e2f;
    color: white;
}

.dark table {
    background: #2a2a40;
    color: white;
}

.dark th, .dark td {
    border-color: #444;
}

.dark input {
    background: #2a2a40;
    color: white;
    border: 1px solid #444;
}

.dark button {
    background: #6c63ff;
    color: white;
}

.dark .summary div {
    background: #2a2a40;
}

</style>

</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<h1>🚀 API Health Dashboard (DevOps)</h1>

<div class="summary">
    <div id="total">Total: 0</div>
    <div id="up">UP: 0</div>
    <div id="down">DOWN: 0</div>
</div>

<div class="form">
    <input id="name" placeholder="API Name">
    <input id="url" placeholder="API URL">
    <button onclick="addAPI()">Add API</button>
</div>

<p id="lastUpdated">Last Updated: -</p>

<table>
    <thead>
        <tr>
            <th>API</th>
            <th>Status</th>
            <th>Response Time (ms)</th>
            <th>Status Code</th>
            <th>Uptime %</th>
            <th>Time</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="table"></tbody>
</table>



<h2>📊 Live Graph</h2>
<canvas id="chart" width="800" height="300"></canvas>

<script>

/* Dark Mode Toggle */

function toggleDark() {
    document.body.classList.toggle("dark")

    if(document.body.classList.contains("dark")){
        localStorage.setItem("darkMode","enabled")
    } else {
        localStorage.setItem("darkMode","disabled")
    }
}

/* Apply saved dark mode */

if(localStorage.getItem("darkMode") === "enabled"){
    document.body.classList.add("dark")
}

let chart;
let chartData = [];
let labels = [];

async function loadData() {
    const res = await fetch("/status");
    const data = await res.json();

    let html = "";
    let up = 0;
    let down = 0;

    data.forEach(api => {

        if (api.status === "UP") up++;
        else down++;

        html += `
        <tr>
            <td>${api.name}</td>
            <td style="color:${api.status === 'UP' ? 'green' : 'red'}">
                <b>${api.status}</b>
            </td>
            <td>${api.response_time}</td>
            <td>${api.status_code}</td>
            <td>${api.uptime}%</td>
            <td>${api.time}</td>
            <td><button onclick="deleteAPI('${api.name}')">Delete</button></td>
        </tr>
        `;

        chartData.push(api.response_time);
        labels.push(api.name);

        if (chartData.length > 10){
            chartData.shift();
            labels.shift();
        }

    });

    document.getElementById("table").innerHTML = html;

    document.getElementById("total").innerText = "Total: " + data.length;
    document.getElementById("up").innerText = "UP: " + up;
    document.getElementById("down").innerText = "DOWN: " + down;

    document.getElementById("lastUpdated").innerText =
        "Last Updated: " + new Date().toLocaleTimeString();

    updateChart();
}

function updateChart(){

    if(chart){
        chart.destroy();
    }

    const ctx = document.getElementById('chart');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Response Time (ms)',
                data: chartData,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true
        }
    });

}

async function addAPI() {

    let name = document.getElementById("name").value;
    let url = document.getElementById("url").value;

    if (!name || !url) {
        alert("Enter API name and URL");
        return;
    }

    const response = await fetch("/add_api", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, url })
    });

    loadData();
}

async function deleteAPI(name) {
    await fetch("/delete_api", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
    });

    loadData();
}

setInterval(loadData, 5000);
loadData();

</script>

</body>
</html>
